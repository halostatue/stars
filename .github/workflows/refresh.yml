name: Refresh stars and regenerate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  refresh:
    name: Refresh stars and regenerate
    runs-on: ubuntu-latest

    permissions:
      contents: write # This workflow updates the contents.

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: halostatue/starlist@d2d5ce64e6010b6234ac3c67cf43631cc9605c10 # v2.0.2
        with:
          token: ${{ secrets.API_TOKEN }}
