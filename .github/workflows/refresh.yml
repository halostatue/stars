name: Refresh stars and regenerate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  refresh:
    name: Refresh stars and regenerate
    runs-on: ubuntu-latest

    permissions:
      contents: write # This workflow updates the contents.

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: halostatue/starlist@c58e6959ce87a8d0a50270ffa2a81869ac481fcd # v3.0.1
        with:
          token: ${{ secrets.API_TOKEN }}
